---
configuration:
  token:
    name: Token
    description: Token from your Ayodo.ru profile
  email:
    name: Email
    description: User email from ayodo.ru
  external_domain:
    name: External domain
    description: Custom external domain (added as a synonym)
  local_host:
    name: HomeAssistant host
    description: >-
      Local HomeAssistant host (default homeassistant)
  local_port:
    name: HomeAssistant port
    description: Local HomeAssistant port (default 8123)
  accept_terms:
    name: generate certificate Let's Encrypt
    description: Accept Let's Encrypt terms and generate certificate
  lets_encrypt:
    name: Let's Encrypt
    description: Let's Encrypt configuration
    fields:
      algo:
        name: Algorithm
        description: Algorithm for Let's Encrypt certificate
      certfile:
        name: Certificate file
        description: Certificate file for Let's Encrypt certificate
      keyfile:
        name: Key file
        description: Key file for Let's Encrypt certificate
      renew_days:
        name: Renew days
        description: Renew days for Let's Encrypt certificate
